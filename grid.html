<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>PATRIOT — Surveillance Grid</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="noise"></div>
  <div class="scanlines"></div>

  <div class="app-shell">

    <div class="glitch-alert" id="glitchAlert">
      TRACE DETECTED
    </div>

    <section class="screen active game-screen" id="game">

      <div class="game-layout">

        <div class="game-hud">

          <div>
            <span>MISSION</span>
            <strong>SURVEILLANCE GRID</strong>
          </div>

          <div>
            <span>OPERATIVE</span>
            <strong id="operativeClass">OPERATOR</strong>
          </div>

          <div>
            <span>SURVIVAL</span>
            <strong id="survivalTime">00:00</strong>
          </div>

          <div>
            <span>TRACE LEVEL</span>
            <strong id="traceLevel">0%</strong>
          </div>

        </div>

        <canvas id="gridCanvas" width="900" height="520"></canvas>

        <div class="mobile-controls">

          <div>
            <button data-dir="up">▲</button>
          </div>

          <div>
            <button data-dir="left">◀</button>
            <button data-dir="down">▼</button>
            <button data-dir="right">▶</button>
          </div>

        </div>

      </div>

    </section>

    <section class="screen gameover-screen" id="gameover">

      <div class="result-card gameover-card">

        <div class="classified-stamp red">
          TRACE COMPLETE
        </div>

        <p class="eyebrow">
          OPERATIVE COMPROMISED
        </p>

        <h2>YOU WERE SEEN</h2>

        <p id="finalStats">
          YOU SURVIVED: 00:42 | TRACE: 92%
        </p>

        <p class="share-line">
          Only 4% reached extraction.
        </p>

        <div class="cta-row">

          <button class="primary-btn" id="retryGameBtn">
            RETRY MISSION
          </button>

          <a
            class="secondary-btn"
            href="https://patriot.neilbuilds.com"
            style="text-decoration:none;display:flex;align-items:center;"
          >
            RETURN TO SYSTEM
          </a>

        </div>

        <br/>

        <a
          class="ticket-link"
          href="https://www.google.com/search?q=Patriot+Malayalam+movie+showtimes+near+me"
          target="_blank"
          rel="noopener noreferrer"
        >
          BOOK TICKETS NOW
        </a>

      </div>

    </section>

  </div>

  <script src="script.js"></script>

  <script>
    selectedProfile = 'operator';

    window.onload = () => {
      showScreen('game');
      startGame();
    };
  </script>

</body>
</html>
